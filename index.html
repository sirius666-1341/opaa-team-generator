<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPAA Team Generator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      flex: 1;
      min-width: 200px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .add-btn {
      background: #4caf50;
      color: white;
    }

    .generate-btn {
      background: #2196f3;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }

    .clear-btn {
      background: #f44336;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }

    .players-list {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .player-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .teams {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .team-box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 15px;
    }

    .team-box h2 {
      margin-top: 0;
      text-align: center;
    }

    .section-title {
      margin-top: 20px;
      color: #90caf9;
    }

    .member {
      padding: 6px 0;
      border-bottom: 1px solid #333;
    }

    .empty {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OPAA Team Generator</h1>

    <div class="input-box">
      <input type="text" id="name" placeholder="Player Name" />
      <input type="number" id="power" placeholder="Power" />
      <button class="add-btn" onclick="addPlayer()">Add</button>
    </div>

    <button class="generate-btn" onclick="generateTeams()">
      Generate Teams
    </button>

    <button 
  class="clear-btn" 
  onclick="clearPlayers()"
  style="display: ${isAdmin ? 'block' : 'none'};"
>
  Clear All Players
</button>

    <div class="players-list">
      <h2>Player List</h2>
      <div id="players"></div>
    </div>

    <div class="teams">
      <div class="team-box">
        <h2>
  TEAM A (ODD)

  ${isAdmin ? `
  <button onclick="copyTeam('A')">
    Copy
  </button>
  ` : ''}
        </h2>
        <h3 class="section-title">Main Team</h3>
        <div id="teamAMain"></div>

        <h3 class="section-title">Substitute</h3>
        <div id="teamASub"></div>
      </div>

      <div class="team-box">
        <h2>
  TEAM B (EVEN)

  ${isAdmin ? `
  <button onclick="copyTeam('B')">
    Copy
  </button>
  ` : ''}
        </h2>
        <h3 class="section-title">Main Team</h3>
        <div id="teamBMain"></div>

        <h3 class="section-title">Substitute</h3>
        <div id="teamBSub"></div>
      </div>
    </div>
  </div>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
onSnapshot,
deleteDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7FLnKz0hq1fBIZT9UakE7h8K-IWCkHws",
  authDomain: "opaa-team-generator.firebaseapp.com",
  projectId: "opaa-team-generator",
  storageBucket: "opaa-team-generator.firebasestorage.app",
  messagingSenderId: "512103695316",
  appId: "1:512103695316:web:76df61edd28072780fcc41"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players = [];
const isAdmin = window.location.search.includes("admin=opaa1341");
async function addPlayer() {
  const name = document.getElementById('name').value.trim();
  const power = parseInt(document.getElementById('power').value);

  if (!name || isNaN(power)) {
    alert('Please enter valid data!');
    return;
  }

  const duplicate = players.find(
  player => player.name.toLowerCase() === name.toLowerCase()
);

if (duplicate) {
  alert('This player name is already registered!');
  return;
}
  await addDoc(collection(db, "players"), {
  name,
  power,
  createdAt: Date.now()
});

  document.getElementById('name').value = '';
  document.getElementById('power').value = '';
}

window.addPlayer = addPlayer;
async function removePlayer(name) {
  const q = query(collection(db, "players"), where("name", "==", name));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(async (document) => {
    await deleteDoc(document.ref);
  });
}

window.removePlayer = removePlayer;
function renderPlayers() {
  const container = document.getElementById('players');

  if (players.length === 0) {
    container.innerHTML = '<div class=\"empty\">No players yet</div>';
    return;
  }

  container.innerHTML = '';

  players.forEach((player, index) => {
    container.innerHTML += `
      <div class=\"player-item\">
        <span>${index + 1}. ${player.name} - ${player.power}</span>

${isAdmin ? `
<button onclick="removePlayer('${player.name}')">
  Remove
</button>
` : ''}
      </div>
    `;
  });

  generateTeams();
}

function generateTeams() {
  let teamA = [];
  let teamB = [];

  players.sort((a, b) => b.power - a.power);

players.forEach((player, index) => {
  const rank = index + 1;

  if (rank % 2 === 1) {
    teamA.push(player);
  } else {
    teamB.push(player);
  }
});

  teamA.sort((a, b) => b.power - a.power);
  teamB.sort((a, b) => b.power - a.power);

  renderTeam('teamAMain', teamA.slice(0, 20));
  renderTeam('teamASub', teamA.slice(20, 30));

  renderTeam('teamBMain', teamB.slice(0, 20));
  renderTeam('teamBSub', teamB.slice(20, 30));
}

function renderTeam(id, team) {
  const container = document.getElementById(id);

  if (team.length === 0) {
    container.innerHTML = '<div class=\"empty\">No players</div>';
    return;
  }

  container.innerHTML = '';

  team.forEach((player, index) => {
    container.innerHTML += `
      <div class=\"member\">
        ${index + 1}. ${player.name} - ${player.power}
      </div>
    `;
  });
}

onSnapshot(collection(db, "players"), (snapshot) => {
  players = [];

  snapshot.forEach((doc) => {
  players.push(doc.data());
});

players.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

renderPlayers();

});
async function clearPlayers() {
  const confirmClear = confirm("Delete all players?");

  if (!confirmClear) return;

  const snapshot = await getDocs(collection(db, "players"));

  snapshot.forEach(async (document) => {
    await deleteDoc(document.ref);
  });
}

window.clearPlayers = clearPlayers;
 function copyTeam(team) {
  let text = "";

  if (team === "A") {
    text += "TEAM A MAIN\n";

    document.querySelectorAll("#teamAMain .member").forEach((el) => {
      text += el.innerText + "\n";
    });

    text += "\nTEAM A SUBSTITUTE\n";

    document.querySelectorAll("#teamASub .member").forEach((el) => {
      text += el.innerText + "\n";
    });
  }

  if (team === "B") {
    text += "TEAM B MAIN\n";

    document.querySelectorAll("#teamBMain .member").forEach((el) => {
      text += el.innerText + "\n";
    });

    text += "\nTEAM B SUBSTITUTE\n";

    document.querySelectorAll("#teamBSub .member").forEach((el) => {
      text += el.innerText + "\n";
    });
  }

  navigator.clipboard.writeText(text);

  alert("Team copied!");
}

window.copyTeam = copyTeam;
    </script>
  <div style="text-align:center; margin-top:30px; opacity:0.5; font-size:14px;">
    [OPAA] - 1341
  </div>
</body>
</html>
