<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPAA Team Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
  background:
    radial-gradient(circle at top, #172554 0%, #0b1120 60%);

  color: white;
  margin: 0;
  padding: 20px;
  min-height: 100vh;

  font-family: 'Inter', sans-serif;
    }

    h1 {
  text-align: center;

  margin-bottom: 30px;

  font-family: 'Press Start 2P', cursive;

  font-size: 28px;

  color: #facc15;

  text-shadow:
    0 0 10px rgba(250,204,21,0.5),
    0 0 20px rgba(250,204,21,0.2);
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
  background: rgba(255,255,255,0.06);

  color: white;

  border: 1px solid rgba(255,255,255,0.08);

  padding: 14px;

  border-radius: 14px;

  flex: 1;

  min-width: 200px;

  font-size: 15px;

  outline: none;

  transition: 0.25s ease;

  backdrop-filter: blur(6px);
    }
    input:focus {
  border-color: #3b82f6;

  box-shadow:
    0 0 15px rgba(59,130,246,0.4);
    }

    button {
  transition: 0.25s ease;

  font-family: 'Inter', sans-serif;

  font-size: 12px;

  border: 1px solid rgba(255,255,255,0.08);

  letter-spacing: 1px;

  padding: 12px 18px;

  border-radius: 8px;

  cursor: pointer;

  font-weight: bold;
    }

    .add-btn {
  background: linear-gradient(
    135deg,
    #22c55e,
    #16a34a
  );

  color: white;
    }

    .generate-btn {
  background: linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color: white;

  width: 100%;

  margin-bottom: 20px;
    }

    .clear-btn {
  background: linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

  color: white;
    }

    .players-list {
  background: rgba(17,24,39,0.92);

  border: 1px solid rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .player-item {
  display: flex;

  justify-content: space-between;

  align-items: center;

  padding: 10px 0;

  border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .teams {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .team-box {
      background: rgba(17, 24, 39, 0.92);

  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 18px;

  padding: 18px;

  box-shadow:
    0 0 20px rgba(30,58,138,0.25);

  backdrop-filter: blur(6px);

  position: relative;

  overflow: hidden;

  transition: 0.3s ease;
}
.team-box:hover {
  transform: translateY(-4px);

  box-shadow:
    0 0 30px rgba(59,130,246,0.25);
}
.team-box h2 {
  margin-top: 0;

  text-align: center;

  color: #facc15;

  font-family: 'Press Start 2P', cursive;

  font-size: 16px;

  text-shadow:
    0 0 10px rgba(250,204,21,0.25);
}

    .section-title {
      margin-top: 20px;
      color: #90caf9;
    }

    .member {
      padding: 6px 0;
      border-bottom: 1px solid #333;
    }

    .empty {
      opacity: 0.6;
      font-style: italic;
    }
 button:hover {
  transform: translateY(-2px);

  filter: brightness(1.08);

  box-shadow:
    0 0 15px rgba(255,255,255,0.15);
 }
  .top-header {
  text-align: center;

  margin-bottom: 35px;
}

.subtitle {
  color: #94a3b8;

  margin-top: 15px;

  font-size: 13px;

  letter-spacing: 2px;

  text-transform: uppercase;
}
  .dashboard-layout {
  display: grid;

  grid-template-columns: 1fr 1.2fr;

  gap: 25px;
}

.left-panel,
.right-panel {
  display: flex;

  flex-direction: column;

  gap: 20px;
}
    @media (max-width: 900px) {

  .dashboard-layout {
    grid-template-columns: 1fr;
  }

  .teams {
    grid-template-columns: 1fr;
  }

  .input-box {
    flex-direction: column;
  }

  button {
    width: 100%;
  }

    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-header">

  <h1>☠ OPAA COMMAND CENTER ☠</h1>

  <p class="subtitle">
    One Piece Pirate Alliance • Team Management System
  </p>

</div>

    <div class="input-box">
      <input type="text" id="name" placeholder="Player Name" />
      <input type="number" id="power" placeholder="Power" />
      <button class="add-btn" onclick="addPlayer()">Add</button>
    </div>

    <button class="generate-btn" onclick="generateTeams()">
      Generate Teams
    </button>
<div id="announcementAdminPanel" style="display:none;">

  <button class="generate-btn" onclick="generateAnnouncement('A')">
    Generate Team A Position
  </button>

  <button class="generate-btn" onclick="generateAnnouncement('B')">
    Generate Team B Position
  </button>

</div>
    <button 
  id="clearBtn"
  class="clear-btn" 
  onclick="clearPlayers()"
  style="display:none;"
>
  Clear All Players
    </button>
<div class="dashboard-layout">

<div class="left-panel">
    <div class="players-list">
      <h2>Player List</h2>
      <div id="players"></div>
    </div>
<div 
  id="announcementBoxContainer"
  class="players-list"
  style="display:none;"
>
  <h2>Announcement</h2>

  <textarea
    id="announcementBox"
    style="
      width:100%;
      height:500px;
      background:#111;
      color:white;
      border:none;
      padding:15px;
      border-radius:10px;
      resize:vertical;
    "
  ></textarea>

  <button
    class="generate-btn"
    onclick="copyAnnouncement()"
    style="margin-top:10px;"
  >
    Copy Announcement
  </button>
</div>
  
  </div>

<div class="right-panel">
    <div class="teams">
      <div class="team-box">
        <h2 id="teamATitle">
  TEAM A (ODD)
        </h2>
        <h3 class="section-title">Main Team</h3>
        <div id="teamAMain"></div>

        <h3 class="section-title">Substitute</h3>
        <div id="teamASub"></div>
      </div>

      <div class="team-box">
        <h2 id="teamBTitle">
  TEAM B (EVEN)
        </h2>
        <h3 class="section-title">Main Team</h3>
        <div id="teamBMain"></div>

        <h3 class="section-title">Substitute</h3>
        <div id="teamBSub"></div>
      </div>
    </div>
  </div>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
onSnapshot,
deleteDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7FLnKz0hq1fBIZT9UakE7h8K-IWCkHws",
  authDomain: "opaa-team-generator.firebaseapp.com",
  projectId: "opaa-team-generator",
  storageBucket: "opaa-team-generator.firebasestorage.app",
  messagingSenderId: "512103695316",
  appId: "1:512103695316:web:76df61edd28072780fcc41"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players = [];
const isAdmin = window.location.search.includes("admin=opaa1341");
async function addPlayer() {
  const name = document.getElementById('name').value.trim();
  const power = parseInt(document.getElementById('power').value);

  if (!name || isNaN(power)) {
    alert('Please enter valid data!');
    return;
  }

  const duplicate = players.find(
  player => player.name.toLowerCase() === name.toLowerCase()
);

if (duplicate) {
  alert('This player name is already registered!');
  return;
}
  await addDoc(collection(db, "players"), {
  name,
  power,
  createdAt: Date.now()
});

  document.getElementById('name').value = '';
  document.getElementById('power').value = '';
}

window.addPlayer = addPlayer;
async function removePlayer(name) {
  const q = query(collection(db, "players"), where("name", "==", name));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(async (document) => {
    await deleteDoc(document.ref);
  });
}

window.removePlayer = removePlayer;
function renderPlayers() {
  const container = document.getElementById('players');

  if (players.length === 0) {
    container.innerHTML = '<div class=\"empty\">No players yet</div>';
    return;
  }

  container.innerHTML = '';

  players.forEach((player, index) => {
    container.innerHTML += `
      <div class=\"player-item\">
        <span>${index + 1}. ${player.name} - ${player.power}</span>

${isAdmin ? `
<button onclick="removePlayer('${player.name}')">
  Remove
</button>
` : ''}
      </div>
    `;
  });

  generateTeams();
}

function generateTeams() {
  let teamA = [];
  let teamB = [];

  players.sort((a, b) => b.power - a.power);

players.forEach((player, index) => {
  const rank = index + 1;

  if (rank % 2 === 1) {
    teamA.push(player);
  } else {
    teamB.push(player);
  }
});

  teamA.sort((a, b) => b.power - a.power);
  teamB.sort((a, b) => b.power - a.power);

  renderTeam('teamAMain', teamA.slice(0, 20));
  renderTeam('teamASub', teamA.slice(20, 30));

  renderTeam('teamBMain', teamB.slice(0, 20));
  renderTeam('teamBSub', teamB.slice(20, 30));
}

function renderTeam(id, team) {
  const container = document.getElementById(id);

  if (team.length === 0) {
    container.innerHTML = '<div class=\"empty\">No players</div>';
    return;
  }

  container.innerHTML = '';

  team.forEach((player, index) => {
    container.innerHTML += `
      <div class=\"member\">
        ${index + 1}. ${player.name} - ${player.power}
      </div>
    `;
  });
}

onSnapshot(collection(db, "players"), (snapshot) => {
  players = [];

  snapshot.forEach((doc) => {
  players.push(doc.data());
});

players.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

renderPlayers();

});
async function clearPlayers() {
  const confirmClear = confirm("Delete all players?");

  if (!confirmClear) return;

  const snapshot = await getDocs(collection(db, "players"));

  snapshot.forEach(async (document) => {
    await deleteDoc(document.ref);
  });
}

window.clearPlayers = clearPlayers;
 function copyTeam(team) {
  let text = "";

  if (team === "A") {
    text += "TEAM A MAIN\n";

    document.querySelectorAll("#teamAMain .member").forEach((el) => {
      text += el.innerText + "\n";
    });

    text += "\nTEAM A SUBSTITUTE\n";

    document.querySelectorAll("#teamASub .member").forEach((el) => {
      text += el.innerText + "\n";
    });
  }

  if (team === "B") {
    text += "TEAM B MAIN\n";

    document.querySelectorAll("#teamBMain .member").forEach((el) => {
      text += el.innerText + "\n";
    });

    text += "\nTEAM B SUBSTITUTE\n";

    document.querySelectorAll("#teamBSub .member").forEach((el) => {
      text += el.innerText + "\n";
    });
  }

  navigator.clipboard.writeText(text);

  alert("Team copied!");
}

window.copyTeam = copyTeam;
   if (isAdmin) {

  document.getElementById("announcementAdminPanel").style.display = "block";

  document.getElementById("announcementBoxContainer").style.display = "block";

   }
      if (isAdmin) {
  document.getElementById("clearBtn").style.display = "block";

  document.getElementById("teamATitle").innerHTML += `
    <button onclick="copyTeam('A')">
      Copy
    </button>
  `;

  document.getElementById("teamBTitle").innerHTML += `
    <button onclick="copyTeam('B')">
      Copy
    </button>
  `;
    }
  function getTeamRankPlayer(team, rank) {

  let sortedPlayers = players
    .slice()
    .sort((a, b) => b.power - a.power);

  let filtered = [];

  sortedPlayers.forEach((player, index) => {

    const globalRank = index + 1;

    if (team === "A" && globalRank % 2 === 1) {
      filtered.push(player);
    }

    if (team === "B" && globalRank % 2 === 0) {
      filtered.push(player);
    }

  });

  return filtered[rank - 1]?.name || "-";
}

function generateAnnouncement(team) {

  const text = `
⚔️ DESERT STORM TEAM ${team} POSITION ⚔️

FIRST STAGE (FIRST 10 MINUTES)

Hunters
- ${getTeamRankPlayer(team, 1)}
- ${getTeamRankPlayer(team, 2)}
- ${getTeamRankPlayer(team, 3)}
- ${getTeamRankPlayer(team, 4)}
- ${getTeamRankPlayer(team, 5)}

Science Hub
Capturer : ${getTeamRankPlayer(team, 17)}
1st Attacker : ${getTeamRankPlayer(team, 6)}
2nd Attacker : ${getTeamRankPlayer(team, 16)}

Hospital 1
Capturer : ${getTeamRankPlayer(team, 15)}
1st Attacker : ${getTeamRankPlayer(team, 7)}
2nd Attacker : ${getTeamRankPlayer(team, 14)}

Hospital 2
Capturer : ${getTeamRankPlayer(team, 18)}
1st Attacker : ${getTeamRankPlayer(team, 8)}
2nd Attacker : ${getTeamRankPlayer(team, 13)}

Hospital 3
Capturer : ${getTeamRankPlayer(team, 19)}
1st Attacker : ${getTeamRankPlayer(team, 9)}
2nd Attacker : ${getTeamRankPlayer(team, 12)}

Hospital 4
Capturer : ${getTeamRankPlayer(team, 20)}
1st Attacker : ${getTeamRankPlayer(team, 10)}
2nd Attacker : ${getTeamRankPlayer(team, 11)}

Info Center
Capturer : -

Oil Refinery 1
Capturer : -

Oil Refinery 2
Capturer : -

━━━━━━━━━━━━━━

SECOND STAGE (AFTER FIRST 10 MINUTES)

Nuclear Silo
Capturer : ${getTeamRankPlayer(team, 1)}
Attacker : ${getTeamRankPlayer(team, 2)}
Attacker : ${getTeamRankPlayer(team, 3)}
Attacker : ${getTeamRankPlayer(team, 6)}

Arsenal
Capturer : ${getTeamRankPlayer(team, 4)}
Attacker : ${getTeamRankPlayer(team, 7)}
Attacker : ${getTeamRankPlayer(team, 8)}

Mercenary Factory
Capturer : ${getTeamRankPlayer(team, 5)}
Attacker : ${getTeamRankPlayer(team, 9)}
Attacker : ${getTeamRankPlayer(team, 10)}

━━━━━━━━━━━━━━

SUBSTITUTE PLAYERS
- ${getTeamRankPlayer(team, 21)}
- ${getTeamRankPlayer(team, 22)}
- ${getTeamRankPlayer(team, 23)}
- ${getTeamRankPlayer(team, 24)}
- ${getTeamRankPlayer(team, 25)}
- ${getTeamRankPlayer(team, 26)}
- ${getTeamRankPlayer(team, 27)}
- ${getTeamRankPlayer(team, 28)}
- ${getTeamRankPlayer(team, 29)}
- ${getTeamRankPlayer(team, 30)}
`;

  document.getElementById("announcementBox").value = text;
}

window.generateAnnouncement = generateAnnouncement;

function copyAnnouncement() {

  const text = document.getElementById("announcementBox").value;

  navigator.clipboard.writeText(text);

  alert("Announcement copied!");
}

window.copyAnnouncement = copyAnnouncement;
    </script>
  <div style="text-align:center; margin-top:30px; opacity:0.5; font-size:14px;">
    ☠ OPAA CREW • EST. 1341 ☠
  </div>
</body>
</html>
